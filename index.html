<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Apple Mail Builder V2</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  display:flex;
  height:100vh;
  background:#0b0b0f;
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  padding:15px;
  background:#111;
  border-right:1px solid #333;
}

.block{
  padding:10px;
  margin-bottom:10px;
  background:#1c1c1e;
  border-radius:10px;
  cursor:grab;
}

/* EDITOR */
.editor{
  width:400px;
  padding:15px;
  border-right:1px solid #333;
}

.dropzone{
  min-height:400px;
  background:#1c1c1e;
  padding:10px;
  border-radius:10px;
}

/* PREVIEW */
.preview{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#222;
}

.mail{
  width:600px;
  background:#f2f2f2;
  padding:30px;
}

.mail-inner{
  background:#ffffff;
  padding:25px;
  border-radius:6px;
}

/* highlight */
.highlight{
  background:#1c1c1e;
  color:#fff;
  padding:20px;
  border-radius:12px;
  width:85%;
  margin:20px auto;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#007aff;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- BLOCKS -->
<div class="sidebar">
  <h3>Blöcke</h3>

  <div class="block" draggable="true" data-type="title">Titel</div>
  <div class="block" draggable="true" data-type="text">Text</div>
  <div class="block" draggable="true" data-type="highlight">Highlight Box</div>
  <div class="block" draggable="true" data-type="image">Bild</div>

  <button onclick="exportEML()">Download .eml</button>
</div>

<!-- EDITOR -->
<div class="editor">
  <h3>Builder</h3>
  <div id="editor" class="dropzone"></div>

  <input type="file" id="imgUpload">
</div>

<!-- PREVIEW -->
<div class="preview">
  <div class="mail">
    <div id="preview" class="mail-inner"></div>
  </div>
</div>

<script>
const editor = document.getElementById("editor");
const preview = document.getElementById("preview");

/* DRAG */
document.querySelectorAll(".block").forEach(el=>{
  el.addEventListener("dragstart",e=>{
    e.dataTransfer.setData("type", el.dataset.type);
  });
});

/* DROP */
editor.addEventListener("dragover", e=>e.preventDefault());

editor.addEventListener("drop", e=>{
  e.preventDefault();
  const type = e.dataTransfer.getData("type");

  let html = "";

  if(type==="title"){
    html = `<h2>Neuer Titel</h2>`;
  }

  if(type==="text"){
    html = `<p>Neuer Text...</p>`;
  }

  if(type==="highlight"){
    html = `
    <table width="100%" style="margin:20px 0;">
      <tr><td align="center">
        <table width="85%" style="background:#1c1c1e;color:#fff;border-radius:12px;padding:20px;">
          <tr><td>
            <p><b>Label:</b> Wert</p>
          </td></tr>
        </table>
      </td></tr>
    </table>
    `;
  }

  if(type==="image"){
    html = `<p>Bild hier einfügen</p>`;
  }

  editor.innerHTML += html;
  updatePreview();
});

/* IMAGE */
document.getElementById("imgUpload").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(ev){
    editor.innerHTML += `<img src="${ev.target.result}" style="max-width:100%;border-radius:10px;">`;
    updatePreview();
  };
  reader.readAsDataURL(file);
});

/* PREVIEW */
function updatePreview(){
  preview.innerHTML = editor.innerHTML;
}

/* EXPORT */
function buildHTML(){
  return `
  <html>
  <body style="margin:0;background:#f2f2f2;">
    <table width="100%" style="background:#f2f2f2;">
      <tr><td align="center">

        <table width="600" style="background:#ffffff;padding:30px;border-radius:6px;">
          <tr><td style="font-family:Arial;color:#444;">
            ${editor.innerHTML}
          </td></tr>
        </table>

      </td></tr>
    </table>
  </body>
  </html>
  `;
}

function exportEML(){
  const eml =
`Subject: Mail
MIME-Version: 1.0
Content-Type: text/html; charset=UTF-8

${buildHTML()}`;

  const blob = new Blob([eml], {type:"message/rfc822"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "mail.eml";
  a.click();
}
</script>

</body>
</html>
