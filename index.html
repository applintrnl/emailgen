<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title> Internal E-Mail Builder</title>

<style>
body{
  margin:0;
  display:flex;
  height:100vh;
  font-family:-apple-system;
  background:#0b0b0f;
  color:white;
}

/* LAYOUT */
.sidebar{width:240px;padding:15px;background:#111;border-right:1px solid #333}
.builder{width:420px;padding:15px;border-right:1px solid #333;overflow:auto}
.preview{flex:1;display:flex;justify-content:center;align-items:center;background:#222}

.block{background:#1c1c1e;padding:10px;margin-bottom:8px;border-radius:10px;cursor:pointer}
.block-item{background:#1c1c1e;padding:10px;border-radius:10px;margin-bottom:10px}

.controls{display:flex;gap:5px;margin-top:5px}
.controls button{flex:1;background:#333;border:none;color:white;padding:5px;border-radius:6px}

.mail{width:600px;background:#f2f2f2;padding:30px}
.mail-inner{background:#fff;padding:25px;border-radius:6px;color:#444}

/* DRAG */
.block-item.dragging{opacity:.5}

/* BUTTON PREVIEW */
.btn{
  padding:10px 16px;
  border-radius:999px;
  text-decoration:none;
  display:inline-block;
}

.btn.primary{background:#007aff;color:#fff}
.btn.ghost{border:2px solid #007aff;color:#007aff}
.btn.full{display:block;width:100%;text-align:center;background:#007aff;color:#fff}

.highlight{
  background:#1c1c1e;
  color:#fff;
  padding:20px;
  border-radius:12px;
  margin:20px auto;
  width:85%;
}

/* DARK MODE */
@media(prefers-color-scheme:dark){
  .mail{background:#000}
  .mail-inner{background:#1c1c1e;color:#fff}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Blöcke</h3>
  <div class="block" onclick="add('title')">Titel</div>
  <div class="block" onclick="add('text')">Text</div>
  <div class="block" onclick="add('button')">Button</div>
  <div class="block" onclick="add('cols')">2 Spalten</div>
  <div class="block" onclick="add('highlight')">Highlight</div>

  <hr>

  <h4>Templates</h4>
  <div class="block" onclick="loadTemplate('apple')">Apple Info</div>
  <div class="block" onclick="loadTemplate('promo')">Promo</div>

  <hr>

  <button onclick="undo()">↩ Undo</button>
  <button onclick="redo()">↪ Redo</button>

  <hr>

  <button onclick="copyHTML()">📋 Copy</button>
  <button onclick="exportEML()">📩 Export</button>
</div>

<!-- BUILDER -->
<div id="builder" class="builder"></div>

<!-- PREVIEW -->
<div class="preview">
  <div class="mail">
    <div id="preview" class="mail-inner"></div>
  </div>
</div>

<script>
let state = [];
let history = [];
let future = [];

const builder = document.getElementById("builder");
const preview = document.getElementById("preview");

/* ---------- STATE ---------- */
function saveState(){
  history.push(JSON.stringify(state));
  future = [];
}

function undo(){
  if(history.length){
    future.push(JSON.stringify(state));
    state = JSON.parse(history.pop());
    render();
  }
}

function redo(){
  if(future.length){
    history.push(JSON.stringify(state));
    state = JSON.parse(future.pop());
    render();
  }
}

/* ---------- ADD BLOCK ---------- */
function add(type){
  saveState();

  let block = {type:type, content:"Text"};

  if(type==="title") block.content="Titel";
  if(type==="button") block.style="primary";

  state.push(block);
  render();
}

/* ---------- RENDER ---------- */
function render(){
  builder.innerHTML="";
  preview.innerHTML="";

  state.forEach((b,i)=>{

    let el = document.createElement("div");
    el.className="block-item";
    el.draggable=true;

    if(b.type==="title"){
      el.innerHTML=`<h2 contenteditable="true">${b.content}</h2>`;
    }

    if(b.type==="text"){
      el.innerHTML=`<p contenteditable="true">${b.content}</p>`;
    }

    if(b.type==="highlight"){
      el.innerHTML=`<div class="highlight" contenteditable="true">${b.content}</div>`;
    }

    if(b.type==="button"){
      el.innerHTML=`
      <div contenteditable="true">${b.content}</div>
      <select onchange="setStyle(${i},this.value)">
        <option value="primary">Primary</option>
        <option value="ghost">Ghost</option>
        <option value="full">Full</option>
      </select>`;
    }

    if(b.type==="cols"){
      el.innerHTML=`
      <table width="100%">
        <tr>
          <td width="50%" contenteditable="true">Spalte 1</td>
          <td width="50%" contenteditable="true">Spalte 2</td>
        </tr>
      </table>`;
    }

    el.innerHTML += controls(i);

    builder.appendChild(el);

    preview.innerHTML += renderEmail(b);
  });
}

/* ---------- EMAIL RENDER ---------- */
function renderEmail(b){

  if(b.type==="button"){
    return `
<!--[if mso]>
<v:roundrect xmlns:v="urn:schemas-microsoft-com:vml"
href="#" style="height:40px;width:200px;" arcsize="50%" fillcolor="#007aff">
<center style="color:#fff;">${b.content}</center>
</v:roundrect>
<![endif]-->
<a class="btn ${b.style}" href="#">${b.content}</a>`;
  }

  if(b.type==="title") return `<h2>${b.content}</h2>`;
  if(b.type==="text") return `<p>${b.content}</p>`;
  if(b.type==="highlight") return `<div class="highlight">${b.content}</div>`;
  if(b.type==="cols") return `
<table width="100%">
<tr>
<td width="50%">Spalte 1</td>
<td width="50%">Spalte 2</td>
</tr>
</table>`;

}

/* ---------- CONTROLS ---------- */
function controls(i){
  return `
  <div class="controls">
    <button onclick="del(${i})">❌</button>
  </div>`;
}

function del(i){
  saveState();
  state.splice(i,1);
  render();
}

function setStyle(i,val){
  state[i].style=val;
}

/* ---------- TEMPLATE ---------- */
function loadTemplate(type){
  saveState();

  if(type==="apple"){
    state=[
      {type:"title",content:"Apple Update"},
      {type:"text",content:"Neue Infos verfügbar"},
      {type:"button",content:"Jetzt ansehen",style:"primary"}
    ];
  }

  if(type==="promo"){
    state=[
      {type:"title",content:"Special Offer"},
      {type:"cols"},
      {type:"button",content:"Shop now",style:"full"}
    ];
  }

  render();
}

/* ---------- EXPORT ---------- */
function buildHTML(){
  return `
<html>
<body style="margin:0;background:#f2f2f2;">
<table width="100%">
<tr><td align="center">

<table width="600" style="background:#fff;padding:30px;">
<tr><td>
${preview.innerHTML}
</td></tr>
</table>

</td></tr>
</table>
</body>
</html>`;
}

function copyHTML(){
  navigator.clipboard.writeText(buildHTML());
  alert("Copied");
}

function exportEML(){
  const eml =
`Subject: Mail
MIME-Version: 1.0
Content-Type: text/html

${buildHTML()}`;

  const blob = new Blob([eml],{type:"message/rfc822"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="mail.eml";
  a.click();
}
</script>

</body>
</html>
