<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Apple Mail Builder V3</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  display:flex;
  height:100vh;
  background:#0b0b0f;
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  padding:15px;
  background:#111;
  border-right:1px solid #333;
}

.block{
  padding:10px;
  margin-bottom:10px;
  background:#1c1c1e;
  border-radius:10px;
  cursor:pointer;
}

/* BUILDER */
.builder{
  width:420px;
  padding:15px;
  border-right:1px solid #333;
  overflow:auto;
}

.block-item{
  background:#1c1c1e;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.controls{
  margin-top:5px;
  display:flex;
  gap:5px;
}

.controls button{
  flex:1;
  background:#333;
  border:none;
  color:white;
  padding:5px;
  border-radius:6px;
  cursor:pointer;
}

/* PREVIEW */
.preview{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#222;
}

.mail{
  width:600px;
  background:#f2f2f2;
  padding:30px;
}

.mail-inner{
  background:#fff;
  padding:25px;
  border-radius:6px;
  color:#444;
}

.highlight{
  background:#1c1c1e;
  color:#fff;
  padding:20px;
  border-radius:12px;
  width:85%;
  margin:20px auto;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Blöcke</h3>

  <div class="block" onclick="addBlock('title')">Titel</div>
  <div class="block" onclick="addBlock('text')">Text</div>
  <div class="block" onclick="addBlock('highlight')">Highlight</div>

  <hr>

  <button onclick="saveTemplate()">💾 Template speichern</button>
  <button onclick="loadTemplate()">📂 Template laden</button>
  <button onclick="exportEML()">📩 Export .eml</button>
</div>

<!-- BUILDER -->
<div class="builder" id="builder"></div>

<!-- PREVIEW -->
<div class="preview">
  <div class="mail">
    <div class="mail-inner" id="preview"></div>
  </div>
</div>

<script>
let blocks = [];

function addBlock(type){
  let content = "";

  if(type==="title") content = "<h2 contenteditable='true'>Titel</h2>";
  if(type==="text") content = "<p contenteditable='true'>Text bearbeiten...</p>";
  if(type==="highlight") content = `
    <table width="100%">
      <tr><td align="center">
        <table width="85%" style="background:#1c1c1e;color:#fff;border-radius:12px;padding:20px;">
          <tr><td contenteditable="true">
            <b>Label:</b> Wert
          </td></tr>
        </table>
      </td></tr>
    </table>
  `;

  blocks.push(content);
  render();
}

function moveUp(i){
  if(i===0) return;
  [blocks[i], blocks[i-1]] = [blocks[i-1], blocks[i]];
  render();
}

function moveDown(i){
  if(i===blocks.length-1) return;
  [blocks[i], blocks[i+1]] = [blocks[i+1], blocks[i]];
  render();
}

function removeBlock(i){
  blocks.splice(i,1);
  render();
}

function render(){
  const builder = document.getElementById("builder");
  builder.innerHTML = "";

  blocks.forEach((block, i)=>{
    builder.innerHTML += `
      <div class="block-item">
        ${block}
        <div class="controls">
          <button onclick="moveUp(${i})">⬆️</button>
          <button onclick="moveDown(${i})">⬇️</button>
          <button onclick="removeBlock(${i})">❌</button>
        </div>
      </div>
    `;
  });

  updatePreview();
}

function updatePreview(){
  document.getElementById("preview").innerHTML = blocks.join("");
}

/* SAVE / LOAD */
function saveTemplate(){
  localStorage.setItem("mailTemplate", JSON.stringify(blocks));
  alert("Gespeichert");
}

function loadTemplate(){
  const data = localStorage.getItem("mailTemplate");
  if(!data) return;
  blocks = JSON.parse(data);
  render();
}

/* EXPORT */
function buildHTML(){
  return `
  <html>
  <body style="margin:0;background:#f2f2f2;">
    <table width="100%">
      <tr><td align="center">
        <table width="600" style="background:#fff;padding:30px;border-radius:6px;">
          <tr><td style="font-family:Arial;color:#444;">
            ${blocks.join("")}
          </td></tr>
        </table>
      </td></tr>
    </table>
  </body>
  </html>
  `;
}

function exportEML(){
  const eml =
`Subject: Mail
MIME-Version: 1.0
Content-Type: text/html; charset=UTF-8

${buildHTML()}`;

  const blob = new Blob([eml], {type:"message/rfc822"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "mail.eml";
  a.click();
}
</script>

</body>
</html>
